<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="axialStem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Stem -->
  <rect x="38" y="20" width="4" height="55" rx="2" fill="url(#axialStem)"/>
  <!-- Leaves -->
  <ellipse cx="25" cy="40" rx="12" ry="6" fill="#66BB6A" transform="rotate(-30 25 40)"/>
  <ellipse cx="55" cy="35" rx="12" ry="6" fill="#66BB6A" transform="rotate(30 55 35)"/>
  <!-- Axial flowers (on leaf axils) -->
  <circle cx="28" cy="50" r="8" fill="#BA68C8"/>
  <circle cx="52" cy="45" r="8" fill="#BA68C8"/>
  <circle cx="28" cy="65" r="6" fill="#BA68C8"/>
  <!-- Label -->
  <text x="10" y="15" font-size="9" fill="#666">Aksial</text>
</svg>