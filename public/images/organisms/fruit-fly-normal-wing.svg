  <path d="M55 18 Q58 12 60 10" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <!-- Legs -->
  <path d="M42 50 L35 65 L30 70" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <path d="M50 52 L48 68 L45 75" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <path d="M58 50 L65 65 L70 70" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <path d="M50 52 L52 68 L55 75" stroke="#52525b" stroke-width="1.5" fill="none"/>
