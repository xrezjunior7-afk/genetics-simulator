<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="flyBodyNormal" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#a1a1aa"/>
      <stop offset="100%" style="stop-color:#71717a"/>
    </radialGradient>
  </defs>
  <!-- Normal Wings -->
  <ellipse cx="32" cy="45" rx="22" ry="12" fill="#e4e4e7" opacity="0.8" transform="rotate(-15 32 45)"/>
  <ellipse cx="68" cy="45" rx="22" ry="12" fill="#e4e4e7" opacity="0.8" transform="rotate(15 68 45)"/>
  <!-- Wing veins -->
  <path d="M20 42 L40 45" stroke="#a1a1aa" stroke-width="0.5" opacity="0.5"/>
  <path d="M60 45 L80 42" stroke="#a1a1aa" stroke-width="0.5" opacity="0.5"/>
  <!-- Abdomen -->
  <ellipse cx="50" cy="65" rx="12" ry="18" fill="url(#flyBodyNormal)"/>
