<svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="flyBody" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="wingNormal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Wings (normal size) -->
  <ellipse cx="35" cy="35" rx="30" ry="12" fill="url(#wingNormal)" stroke="#90CAF9" stroke-width="0.5"/>
  <ellipse cx="35" cy="50" rx="30" ry="12" fill="url(#wingNormal)" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- Body -->
  <ellipse cx="65" cy="42" rx="25" ry="12" fill="url(#flyBody)"/>
  <!-- Head -->
  <circle cx="88" cy="42" r="10" fill="url(#flyBody)"/>
  <!-- Eyes -->
  <ellipse cx="92" cy="38" rx="5" ry="6" fill="#E53935"/>
  <ellipse cx="92" cy="46" rx="5" ry="6" fill="#E53935"/>
  <!-- Antennae -->
  <line x1="95" y1="35" x2="100" y2="28" stroke="#3E2723" stroke-width="1"/>
  <line x1="95" y1="49" x2="100" y2="56" stroke="#3E2723" stroke-width="1"/>
  <!-- Legs -->
  <line x1="55" y1="50" x2="50" y2="65" stroke="#3E2723" stroke-width="1"/>
  <line x1="65" y1="52" x2="62" y2="68" stroke="#3E2723" stroke-width="1"/>
  <line x1="75" y1="50" x2="75" y2="65" stroke="#3E2723" stroke-width="1"/>
  <!-- Label -->
  <text x="25" y="75" font-size="9" fill="#5D4037">Normal</text>
</svg>