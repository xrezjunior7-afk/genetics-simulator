<svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blackFur" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#424242;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </radialGradient>
    <filter id="furTexture">
      <feTurbulence type="turbulence" baseFrequency="0.15" numOctaves="2" result="turbulence"/>
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="2" />
    </filter>
  </defs>
  <!-- Body -->
  <ellipse cx="60" cy="45" rx="40" ry="25" fill="url(#blackFur)"/>
  <!-- Head -->
  <ellipse cx="95" cy="40" rx="18" ry="15" fill="url(#blackFur)"/>
  <!-- Ears -->
  <ellipse cx="88" cy="28" rx="8" ry="6" fill="#333"/>
  <ellipse cx="100" cy="28" rx="8" ry="6" fill="#333"/>
  <!-- Eyes -->
  <circle cx="102" cy="38" r="4" fill="#1a1a1a"/>
  <circle cx="103" cy="37" r="1.5" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="110" cy="42" rx="4" ry="3" fill="#FFB6C1"/>
  <!-- Legs -->
  <ellipse cx="35" cy="62" rx="8" ry="6" fill="url(#blackFur)"/>
  <ellipse cx="75" cy="62" rx="8" ry="6" fill="url(#blackFur)"/>
  <!-- Tail area -->
  <ellipse cx="22" cy="48" rx="5" ry="4" fill="url(#blackFur)"/>
</svg>