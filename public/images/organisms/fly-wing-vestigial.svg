<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="flyBody2" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="wingVestigial" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Wings (vestigial - small) -->
  <ellipse cx="35" cy="38" rx="8" ry="5" fill="url(#wingVestigial)" stroke="#90CAF9" stroke-width="0.5"/>
  <ellipse cx="35" cy="48" rx="8" ry="5" fill="url(#wingVestigial)" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- Body -->
  <ellipse cx="50" cy="42" rx="20" ry="10" fill="url(#flyBody2)"/>
  <!-- Head -->
  <circle cx="68" cy="42" r="8" fill="url(#flyBody2)"/>
  <!-- Eyes -->
  <ellipse cx="72" cy="39" rx="4" ry="5" fill="#E53935"/>
  <ellipse cx="72" cy="45" rx="4" ry="5" fill="#E53935"/>
  <!-- Antennae -->
  <line x1="74" y1="36" x2="78" y2="30" stroke="#3E2723" stroke-width="1"/>
  <line x1="74" y1="48" x2="78" y2="54" stroke="#3E2723" stroke-width="1"/>
  <!-- Legs -->
  <line x1="40" y1="48" x2="36" y2="60" stroke="#3E2723" stroke-width="1"/>
  <line x1="50" y1="50" x2="48" y2="62" stroke="#3E2723" stroke-width="1"/>
  <line x1="58" y1="48" x2="58" y2="60" stroke="#3E2723" stroke-width="1"/>
  <!-- Label -->
  <text x="20" y="75" font-size="9" fill="#5D4037">Vestigial</text>
</svg>