<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grayBody" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#9E9E9E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#616161;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="wingGray" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Wings -->
  <ellipse cx="28" cy="38" rx="20" ry="8" fill="url(#wingGray)" stroke="#90CAF9" stroke-width="0.5"/>
  <ellipse cx="28" cy="48" rx="20" ry="8" fill="url(#wingGray)" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- Body -->
  <ellipse cx="45" cy="42" rx="18" ry="9" fill="url(#grayBody)"/>
  <!-- Head -->
  <circle cx="60" cy="42" r="7" fill="url(#grayBody)"/>
  <!-- Eyes -->
  <ellipse cx="63" cy="40" rx="3.5" ry="4" fill="#E53935"/>
  <ellipse cx="63" cy="44" rx="3.5" ry="4" fill="#E53935"/>
  <!-- Antennae -->
  <line x1="65" y1="37" x2="68" y2="32" stroke="#616161" stroke-width="1"/>
  <line x1="65" y1="47" x2="68" y2="52" stroke="#616161" stroke-width="1"/>
  <!-- Legs -->
  <line x1="36" y1="47" x2="34" y2="56" stroke="#616161" stroke-width="1"/>
  <line x1="45" y1="49" x2="44" y2="58" stroke="#616161" stroke-width="1"/>
  <line x1="52" y1="47" x2="52" y2="56" stroke="#616161" stroke-width="1"/>
  <!-- Label -->
  <text x="30" y="72" font-size="10" fill="#616161" font-weight="bold">Abu-abu</text>
</svg>