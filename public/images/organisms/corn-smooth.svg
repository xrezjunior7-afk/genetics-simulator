<svg viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="smoothKernel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEB3B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9A825;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Corn ear shape -->
  <ellipse cx="30" cy="50" rx="22" ry="40" fill="#FFFDE7" stroke="#FBC02D" stroke-width="1"/>
  <!-- Smooth round kernels in rows -->
  <g fill="url(#smoothKernel)">
    <!-- Row 1 -->
    <circle cx="20" cy="20" r="6"/><circle cx="32" cy="18" r="6"/><circle cx="44" cy="20" r="5"/>
    <!-- Row 2 -->
    <circle cx="14" cy="34" r="5"/><circle cx="26" cy="32" r="6"/><circle cx="38" cy="32" r="6"/><circle cx="48" cy="34" r="5"/>
    <!-- Row 3 -->
    <circle cx="18" cy="46" r="6"/><circle cx="32" cy="44" r="6"/><circle cx="44" cy="46" r="5"/>
    <!-- Row 4 -->
    <circle cx="14" cy="58" r="5"/><circle cx="26" cy="56" r="6"/><circle cx="38" cy="56" r="6"/><circle cx="48" cy="58" r="5"/>
    <!-- Row 5 -->
    <circle cx="20" cy="70" r="6"/><circle cx="32" cy="68" r="6"/><circle cx="44" cy="70" r="5"/>
    <!-- Row 6 -->
    <circle cx="26" cy="82" r="5"/><circle cx="38" cy="82" r="5"/>
  </g>
  <!-- Label -->
  <text x="15" y="98" font-size="9" fill="#F57F17" font-weight="bold">Licin</text>
</svg>