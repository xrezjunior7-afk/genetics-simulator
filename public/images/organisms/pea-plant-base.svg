<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Stem -->
  <path d="M50 115 Q45 80 50 40 Q55 80 50 115" fill="url(#stemGrad)" stroke="#2E7D32" stroke-width="2"/>
  <!-- Leaves -->
  <ellipse cx="35" cy="60" rx="15" ry="8" fill="url(#leafGrad)" transform="rotate(-30 35 60)"/>
  <ellipse cx="65" cy="50" rx="15" ry="8" fill="url(#leafGrad)" transform="rotate(30 65 50)"/>
  <ellipse cx="30" cy="85" rx="12" ry="6" fill="url(#leafGrad)" transform="rotate(-45 30 85)"/>
  <ellipse cx="70" cy="75" rx="12" ry="6" fill="url(#leafGrad)" transform="rotate(45 70 75)"/>
  <!-- Tendrils -->
  <path d="M55 45 Q70 35 65 25" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 50 Q30 40 35 30" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
</svg>