<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="terminalStem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Stem -->
  <rect x="38" y="30" width="4" height="45" rx="2" fill="url(#terminalStem)"/>
  <!-- Leaves -->
  <ellipse cx="25" cy="50" rx="12" ry="6" fill="#66BB6A" transform="rotate(-30 25 50)"/>
  <ellipse cx="55" cy="45" rx="12" ry="6" fill="#66BB6A" transform="rotate(30 55 45)"/>
  <!-- Terminal flower (at stem tip) -->
  <circle cx="40" cy="25" r="10" fill="#BA68C8"/>
  <circle cx="40" cy="25" r="6" fill="#FFF59D"/>
  <!-- Label -->
  <text x="10" y="15" font-size="9" fill="#666">Terminal</text>
</svg>