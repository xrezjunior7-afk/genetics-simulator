<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="flyBodyVest" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#a1a1aa"/>
      <stop offset="100%" style="stop-color:#71717a"/>
    </radialGradient>
  </defs>
  <!-- Vestigial Wings (small) -->
  <ellipse cx="40" cy="45" rx="8" ry="5" fill="#e4e4e7" opacity="0.8"/>
  <ellipse cx="60" cy="45" rx="8" ry="5" fill="#e4e4e7" opacity="0.8"/>
  <!-- Abdomen -->
  <ellipse cx="50" cy="65" rx="12" ry="18" fill="url(#flyBodyVest)"/>
  <!-- Thorax -->
  <ellipse cx="50" cy="42" rx="10" ry="12" fill="url(#flyBodyVest)"/>
  <!-- Head -->
  <circle cx="50" cy="25" r="10" fill="url(#flyBodyVest)"/>
  <!-- Eyes -->
  <ellipse cx="43" cy="23" rx="5" ry="6" fill="#dc2626"/>
  <ellipse cx="57" cy="23" rx="5" ry="6" fill="#dc2626"/>
  <!-- Antennae -->
  <path d="M45 18 Q42 12 40 10" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <path d="M55 18 Q58 12 60 10" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <!-- Legs -->
  <path d="M42 50 L35 65 L30 70" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <path d="M50 52 L48 68 L45 75" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <path d="M58 50 L65 65 L70 70" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <path d="M50 52 L52 68 L55 75" stroke="#52525b" stroke-width="1.5" fill="none"/>
  <!-- Label -->
  <text x="50" y="95" font-size="8" fill="#71717a" text-anchor="middle">vestigial</text>
</svg>
