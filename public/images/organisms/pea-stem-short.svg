<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shortStem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Short stem -->
  <rect x="38" y="45" width="6" height="30" rx="3" fill="url(#shortStem)"/>
  <!-- Leaves -->
  <ellipse cx="25" cy="55" rx="15" ry="7" fill="#66BB6A" transform="rotate(-30 25 55)"/>
  <ellipse cx="55" cy="50" rx="15" ry="7" fill="#66BB6A" transform="rotate(30 55 50)"/>
  <!-- Height indicator -->
  <text x="65" y="60" font-size="10" fill="#666">Pendek</text>
</svg>