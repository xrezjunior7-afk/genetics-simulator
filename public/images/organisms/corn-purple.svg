<svg viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleKernel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6A1B9A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Corn ear shape -->
  <ellipse cx="30" cy="50" rx="22" ry="40" fill="#FFF59D" stroke="#F9A825" stroke-width="1"/>
  <!-- Purple kernels in rows -->
  <g fill="url(#purpleKernel)">
    <!-- Row 1 -->
    <circle cx="20" cy="20" r="5"/><circle cx="30" cy="18" r="5"/><circle cx="40" cy="20" r="5"/>
    <!-- Row 2 -->
    <circle cx="15" cy="32" r="5"/><circle cx="25" cy="30" r="5"/><circle cx="35" cy="30" r="5"/><circle cx="45" cy="32" r="5"/>
    <!-- Row 3 -->
    <circle cx="18" cy="44" r="5"/><circle cx="28" cy="42" r="5"/><circle cx="38" cy="42" r="5"/>
    <!-- Row 4 -->
    <circle cx="15" cy="56" r="5"/><circle cx="25" cy="54" r="5"/><circle cx="35" cy="54" r="5"/><circle cx="45" cy="56" r="5"/>
    <!-- Row 5 -->
    <circle cx="20" cy="68" r="5"/><circle cx="30" cy="66" r="5"/><circle cx="40" cy="68" r="5"/>
    <!-- Row 6 -->
    <circle cx="25" cy="80" r="4"/><circle cx="35" cy="80" r="4"/>
  </g>
  <!-- Label -->
  <text x="18" y="98" font-size="9" fill="#6A1B9A" font-weight="bold">Ungu</text>
</svg>